<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сон — Глава 1</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Анимация появления при загрузке */
        #fade-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            pointer-events: none;
            animation: fadeInPage 2s forwards;
        }

        @keyframes fadeInPage {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* Задний фон с эффектом параллакса и размытия */
        #game-bg {
            position: fixed;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            background-size: cover;
            background-position: center;
            z-index: 1;
            filter: blur(1px) brightness(0.8) contrast(1.05); 
            transition: background-image 1s ease-in-out, transform 0.1s ease-out;
        }

        /* Эстетичный шум */
        .noise {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain_Noise.png');
            opacity: 0.04;
            pointer-events: none;
        }

        /* Интерфейс */
        .game-interface {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 60px;
            box-sizing: border-box;
        }

        /* Окно диалога */
        .text-box {
            width: 85%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.7);
            border-left: 4px solid #fff;
            padding: 30px;
            color: #fff;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .text-box:hover {
            background: rgba(10, 10, 10, 0.85);
        }

        #game-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 0;
            letter-spacing: 1px;
        }

        /* Выборы */
        .choices-wrapper {
            display: none;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 400px;
        }

        .choice-button {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 15px;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .choice-button:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
            transform: scale(1.02);
        }

        .hint {
            margin-top: 15px;
            font-size: 0.7rem;
            opacity: 0.5;
            text-align: right;
            text-transform: uppercase;
        }
    </style>
</head>
<body onkeydown="handleKeyPress(event)">

    <div id="fade-overlay"></div>
    <div id="game-bg"></div>
    <div class="noise"></div>

    <!-- Звуки UI (фоновая музыка удалена) -->
    <audio id="snd-hover" preload="auto">
        <source src="../mus/tach.mp3" type="audio/mpeg">
    </audio>
    <audio id="snd-click" preload="auto">
        <source src="../mus/click.mp3" type="audio/mpeg">
    </audio>

    <div class="game-interface">
        <div class="choices-wrapper" id="choices-ui"></div>

        <div class="text-box" id="dialog-box" onclick="nextStep()">
            <p id="game-text">Загрузка реальности...</p>
            <div class="hint">Нажми Пробел или Кликни</div>
        </div>
    </div>

    <script>
        const bg = document.getElementById('game-bg');
        const textDisplay = document.getElementById('game-text');
        const choicesUI = document.getElementById('choices-ui');
        const dialogBox = document.getElementById('dialog-box');
        
        // Звуковые элементы
        const sndHover = document.getElementById('snd-hover');
        const sndClick = document.getElementById('snd-click');

        // Настройка громкости (как на index.html)
        if (sndHover) sndHover.volume = 0.5;
        if (sndClick) sndClick.volume = 0.6;

        localStorage.setItem('last_save', window.location.pathname);

        const story = [
            {
                text: "Воздух кажется густым, как кисель. Температура явно выше сорока.",
                img: "https://i.pinimg.com/736x/e6/67/08/e667081c19e9912ca2fa55c105e016fc.jpg"
            },
            {
                text: "Тени на стенах начинают шевелиться. Кажется, одна из них только что моргнула.",
                img: "https://i.pinimg.com/736x/6f/9b/a3/6f9ba3c46e3e56a6433e5c9f55e5c5f5.jpg"
            },
            {
                text: "Нужно принять решение. Закрыть глаза или пойти на звук?",
                img: "https://i.pinimg.com/736x/e6/67/08/e667081c19e9912ca2fa55c105e016fc.jpg",
                choices: [
                    { t: "Закрыть глаза", link: "002_sleep.html" },
                    { t: "Идти на звук", link: "002_explore.html" }
                ]
            }
        ];

        let currentStep = 0;

        // Функции воспроизведения звуков
        function playHover() {
            if (!sndHover) return;
            sndHover.currentTime = 0;
            sndHover.play().catch(() => {});
        }

        function playClick() {
            if (!sndClick) return;
            sndClick.currentTime = 0;
            sndClick.play().catch(() => {});
        }

        function updateUI() {
            const scene = story[currentStep];
            bg.style.backgroundImage = `url('${scene.img}')`;
            textDisplay.innerText = scene.text;

            if (scene.choices) {
                dialogBox.style.display = "none";
                choicesUI.style.display = "flex";
                choicesUI.innerHTML = scene.choices.map(c => 
                    `<button class="choice-button" onclick="playClick(); setTimeout(()=>location.href='${c.link}', 200)">${c.t}</button>`
                ).join('');

                // Привязываем звук наведения к новым кнопкам
                document.querySelectorAll('.choice-button').forEach(btn => {
                    btn.addEventListener('mouseenter', playHover);
                });
            }
        }

        function nextStep() {
            if (currentStep < story.length - 1 && !story[currentStep].choices) {
                playClick();
                currentStep++;
                updateUI();
            }
        }

        function handleKeyPress(e) {
            if (e.code === "Space") nextStep();
        }

        // Параллакс (скорость 1/30 для соответствия index.html)
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth  / 2 - e.pageX) / 30;
            const y = (window.innerHeight / 2 - e.pageY) / 30;
            bg.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Инициализация звука на основном окне диалога
        dialogBox.addEventListener('mouseenter', playHover);

        updateUI();
    </script>
</body>
</html>
