<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сны при температуре 40</title>
    <style>
        /* Общие настройки */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            /* Вставляем картинку прямо в фон body */
            background-image: url('https://i.pinimg.com/736x/e6/67/08/e667081c19e9912ca2fa55c105e016fc.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #000; /* Резервный цвет */
        }

        /* Контейнер для параллакса (если все же хочешь движение) */
        #bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            /* Мы не будем использовать img, оставим чистый фон body или этот див */
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 80vh;
            z-index: 1;
            position: relative;
        }

        h1 {
            color: #fff;
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 5px 5px 0px #ff0000, -5px -5px 0px #0000ff;
            animation: flicker 4s infinite;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 50px;
        }

        .pixel-button {
            background-color: rgba(0, 0, 0, 0.5); /* Темный фон для читаемости */
            border: 3px solid #fff;
            color: #fff;
            padding: 18px 40px;
            font-size: 1.3rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .pixel-button:hover {
            background-color: #fff;
            color: #000;
            box-shadow: 0 0 20px #fff;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .disabled {
            opacity: 0.3;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="mus/background.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>Сны при<br>температуре 40</h1>

        <nav>
            <button class="pixel-button" onclick="startGame()">Играть</button>
            <button id="continue-btn" class="pixel-button" onclick="continueGame()">Продолжить</button>
            <button class="pixel-button" onclick="window.location.href='info.html'">О разработчике</button>
        </nav>
    </div>

    <script>
        const music = document.getElementById('bg-music');
        const continueBtn = document.getElementById('continue-btn');

        if (music) music.volume = 0.2;

        // Безопасная проверка localStorage
        try {
            if (!localStorage.getItem('last_save')) {
                continueBtn.classList.add('disabled');
            }
        } catch (e) {
            console.warn("LocalStorage заблокирован браузером");
        }

        function startGame() {
            if (music) music.play().catch(() => {});
            setTimeout(() => { window.location.href = 'game/001.html'; }, 300);
        }

        function continueGame() {
            let lastPage = 'game/001.html';
            try {
                lastPage = localStorage.getItem('last_save') || 'game/001.html';
            } catch (e) {}
            window.location.href = lastPage;
        }

        // Запуск музыки по первому клику[cite: 2]
        document.addEventListener('click', () => {
            if (music) music.play().catch(() => {});
        }, { once: true });
    </script>
</body>
</html>
